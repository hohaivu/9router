services:
  9router:
    container_name: 9router
    build:
      context: .
      dockerfile: Dockerfile
    # image: decolua/9router:latest  # swap with this to skip local build
    ports:
      - "20128:20128"
    environment:
      DATA_DIR: /app/data
      PORT: 20128
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
    env_file:
      - .env
    volumes:
      - 9router-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:20128/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  9router-data:
